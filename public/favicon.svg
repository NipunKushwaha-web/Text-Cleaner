<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#0f0f0f"/>

  <!-- Accent corner marks — industrial feel -->
  <rect x="0" y="0" width="4" height="2" fill="#e8ff3a"/>
  <rect x="0" y="0" width="2" height="4" fill="#e8ff3a"/>
  <rect x="28" y="0" width="4" height="2" fill="#e8ff3a"/>
  <rect x="30" y="0" width="2" height="4" fill="#e8ff3a"/>
  <rect x="0" y="30" width="4" height="2" fill="#e8ff3a"/>
  <rect x="0" y="28" width="2" height="4" fill="#e8ff3a"/>
  <rect x="28" y="30" width="4" height="2" fill="#e8ff3a"/>
  <rect x="30" y="28" width="2" height="4" fill="#e8ff3a"/>

  <!-- Broom handle — diagonal line -->
  <line x1="20" y1="6" x2="10" y2="22" stroke="#666" stroke-width="2" stroke-linecap="square"/>

  <!-- Broom head — three sweep lines fanning out -->
  <line x1="10" y1="22" x2="5"  y2="28" stroke="#e8ff3a" stroke-width="2" stroke-linecap="square"/>
  <line x1="10" y1="22" x2="9"  y2="29" stroke="#e8ff3a" stroke-width="2" stroke-linecap="square"/>
  <line x1="10" y1="22" x2="13" y2="28" stroke="#e8ff3a" stroke-width="2" stroke-linecap="square"/>

  <!-- Spark / lightning bolt at top of handle -->
  <polygon points="22,4 19,10 22,10 18,17 24,9 21,9" fill="#e8ff3a"/>
</svg>
